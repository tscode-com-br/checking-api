# Include this file from the nginx http {} context.
# Example: include /etc/nginx/conf.d/checkcheck-edge-http.conf;
# Companion to deploy/nginx/checking-edge-routes.conf.

# Authentication endpoints are burst-sensitive but still need to tolerate
# shared NATs and browser retries, so the baseline stays intentionally generous.
limit_req_zone $binary_remote_addr zone=checkcheck_edge_auth:10m rate=15r/s;

# SSE reconnect storms should be smoothed before they fan out into the API.
limit_req_zone $binary_remote_addr zone=checkcheck_edge_stream:10m rate=5r/s;