# Include this file inside the existing public HTTPS server block.
# Final edge topology:
# - /api and /assets -> 127.0.0.1:18080
# - /checking/admin -> 127.0.0.1:18084 (admin2-web)
# - /checking/user -> 127.0.0.1:18082
# - /checking/transport -> 127.0.0.1:18083
# Do not keep legacy public routes in the same server block pointing at 127.0.0.1:8000.
# This file expects the optional companion http-level include
# `deploy/nginx/checking-edge-http.conf` when rate limiting is enabled.
# It assumes the separated deploy targets are exposed on localhost only.

keepalive_timeout 15s;
keepalive_requests 100;
send_timeout 30s;

location = /api {
    return 308 /api/;
}

location = /api/health {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_socket_keepalive on;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
    proxy_pass http://127.0.0.1:18080;
}

location = /api/health/ready {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_socket_keepalive on;
    proxy_connect_timeout 3s;
    proxy_read_timeout 15s;
    proxy_send_timeout 15s;
    proxy_pass http://127.0.0.1:18080;
}

location ~ ^/api/(admin/stream|transport/stream|web/transport/stream)$ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_socket_keepalive on;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    add_header X-Accel-Buffering no always;
    limit_req zone=checkcheck_edge_stream burst=15 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:18080;
}

location ~ ^/api/(admin|transport|web)/auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_socket_keepalive on;
    proxy_connect_timeout 3s;
    proxy_read_timeout 20s;
    proxy_send_timeout 20s;
    limit_req zone=checkcheck_edge_auth burst=40 nodelay;
    limit_req_status 429;
    proxy_pass http://127.0.0.1:18080;
}

location = /api/transport/ai/route-calculations {
    proxy_http_version 1.1;
