name: checkcheck-websites

services:
  admin-web:
    image: ${CHECKCHECK_ADMIN_WEB_IMAGE:-checkcheck-admin-web:local}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.admin-web
    restart: unless-stopped
    ports:
      - "${ADMIN_WEB_PORT:-18081}:8080"

  admin2-web:
    image: ${CHECKCHECK_ADMIN2_WEB_IMAGE:-ghcr.io/tscode-com-br/checkcheck-admin2-web:main}
    restart: unless-stopped
    ports:
      - "${ADMIN2_WEB_PORT:-18084}:8080"

  user-web:
    image: ${CHECKCHECK_USER_WEB_IMAGE:-checkcheck-user-web:local}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.user-web
    restart: unless-stopped
    ports:
      - "${USER_WEB_PORT:-18082}:8080"

  transport-web:
    image: ${CHECKCHECK_TRANSPORT_WEB_IMAGE:-checkcheck-transport-web:local}
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.transport-web
    restart: unless-stopped
    ports:
      - "${TRANSPORT_WEB_PORT:-18083}:8080"