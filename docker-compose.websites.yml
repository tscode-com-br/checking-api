name: checkcheck-websites

services:
  admin2-web:
    image: ${CHECKCHECK_ADMIN2_WEB_IMAGE:-ghcr.io/tscode-com-br/checkcheck-admin2-web:main}
    restart: unless-stopped
    ports:
      - "${ADMIN2_WEB_PORT:-18084}:8080"

  user-web:
    image: ${CHECKCHECK_USER_WEB_IMAGE:-ghcr.io/tscode-com-br/checking-webapp:main}
    restart: unless-stopped
    ports:
      - "${USER_WEB_PORT:-18082}:8080"

  transport-web:
    image: ${CHECKCHECK_TRANSPORT_WEB_IMAGE:-ghcr.io/tscode-com-br/checking-transport:main}
    restart: unless-stopped
    ports:
      - "${TRANSPORT_WEB_PORT:-18083}:8080"