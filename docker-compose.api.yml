services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=40
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-checking}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
        - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-checking}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: ${CHECKCHECK_API_IMAGE:-checkcheck-api:local}
    build: &api_runtime_build
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: &api_runtime_environment
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_WORKERS: ${APP_WORKERS:-2}
      APP_KEEPALIVE_SECONDS: ${APP_KEEPALIVE_SECONDS:-5}
      APP_TIMEOUT_SECONDS: ${APP_TIMEOUT_SECONDS:-90}
      APP_GRACEFUL_TIMEOUT_SECONDS: ${APP_GRACEFUL_TIMEOUT_SECONDS:-30}
      APP_MAX_REQUESTS: ${APP_MAX_REQUESTS:-1000}
      APP_MAX_REQUESTS_JITTER: ${APP_MAX_REQUESTS_JITTER:-100}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/checking}
      DATABASE_POOL_SIZE: ${APP_DATABASE_POOL_SIZE:-6}
      DATABASE_MAX_OVERFLOW: ${APP_DATABASE_MAX_OVERFLOW:-2}
      DATABASE_POOL_TIMEOUT_SECONDS: ${APP_DATABASE_POOL_TIMEOUT_SECONDS:-5}
      DATABASE_POOL_RECYCLE_SECONDS: ${APP_DATABASE_POOL_RECYCLE_SECONDS:-1800}
      FORMS_URL: ${FORMS_URL}
      DEVICE_SHARED_KEY: ${DEVICE_SHARED_KEY:-change-me}
      MOBILE_APP_SHARED_KEY: ${MOBILE_APP_SHARED_KEY:-change-mobile-app-shared-key}
      PROVIDER_SHARED_KEY: ${PROVIDER_SHARED_KEY:-PETROBRASP80P82P83}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-change-admin-session-secret}
      BOOTSTRAP_ADMIN_KEY: ${BOOTSTRAP_ADMIN_KEY:-HR70}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Tamer Salmem}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-eAcacdLe2}
      TZ_NAME: ${TZ_NAME:-Asia/Singapore}
      FORMS_TIMEOUT_SECONDS: ${FORMS_TIMEOUT_SECONDS:-30}
      FORMS_MAX_RETRIES: ${FORMS_MAX_RETRIES:-3}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      TRANSPORT_AI_ENABLED: ${TRANSPORT_AI_ENABLED:-false}
      TRANSPORT_AI_AGENT_MODE: ${TRANSPORT_AI_AGENT_MODE:-agent}
      TRANSPORT_AI_OPERATIONAL_APPROVAL_EVIDENCE: ${TRANSPORT_AI_OPERATIONAL_APPROVAL_EVIDENCE:-}
      TRANSPORT_AI_MAX_CONCURRENT_RUNS: ${TRANSPORT_AI_MAX_CONCURRENT_RUNS:-1}
      TRANSPORT_AI_SETTINGS_ENCRYPTION_KEY: ${TRANSPORT_AI_SETTINGS_ENCRYPTION_KEY:-}
      FORMS_QUEUE_ENABLED: ${FORMS_QUEUE_ENABLED:-true}
      EVENT_ARCHIVES_DIR: ${EVENT_ARCHIVES_DIR:-/app/data/event_archives}
      SERVE_ADMIN_SITE_IN_API: ${SERVE_ADMIN_SITE_IN_API:-false}
      SERVE_USER_SITE_IN_API: ${SERVE_USER_SITE_IN_API:-false}
      SERVE_TRANSPORT_SITE_IN_API: ${SERVE_TRANSPORT_SITE_IN_API:-false}
    ports:
      - "${API_PORT:-18080}:8000"
    volumes:
      - event_archives:/app/data/event_archives
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/ready', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 30s

  migrate:
    image: ${CHECKCHECK_API_IMAGE:-checkcheck-api:local}
    build: *api_runtime_build
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment: *api_runtime_environment
    command: ["python", "-m", "alembic", "upgrade", "head"]

  forms-worker:
    image: ${CHECKCHECK_FORMS_WORKER_IMAGE:-checkcheck-forms-worker:local}
    build:
      context: .
      target: forms-worker-runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/checking}
      DATABASE_POOL_SIZE: ${FORMS_WORKER_DATABASE_POOL_SIZE:-2}
      DATABASE_MAX_OVERFLOW: ${FORMS_WORKER_DATABASE_MAX_OVERFLOW:-1}
      DATABASE_POOL_TIMEOUT_SECONDS: ${FORMS_WORKER_DATABASE_POOL_TIMEOUT_SECONDS:-5}
      DATABASE_POOL_RECYCLE_SECONDS: ${FORMS_WORKER_DATABASE_POOL_RECYCLE_SECONDS:-1800}
      FORMS_URL: ${FORMS_URL}
      TZ_NAME: ${TZ_NAME:-Asia/Singapore}
      FORMS_TIMEOUT_SECONDS: ${FORMS_TIMEOUT_SECONDS:-30}
      FORMS_MAX_RETRIES: ${FORMS_MAX_RETRIES:-3}
      FORMS_QUEUE_ENABLED: ${FORMS_QUEUE_ENABLED:-true}
      FORMS_WORKER_HEALTH_UPDATE_SECONDS: ${FORMS_WORKER_HEALTH_UPDATE_SECONDS:-5}
      FORMS_WORKER_HEALTH_STALE_SECONDS: ${FORMS_WORKER_HEALTH_STALE_SECONDS:-20}
      FORMS_WORKER_UNHEALTHY_CONSECUTIVE_ERRORS: ${FORMS_WORKER_UNHEALTHY_CONSECUTIVE_ERRORS:-3}
      EVENT_ARCHIVES_DIR: ${EVENT_ARCHIVES_DIR:-/app/data/event_archives}
    volumes:
      - event_archives:/app/data/event_archives
    healthcheck:
      test: ["CMD-SHELL", "python -m sistema.app.forms_worker_healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
  event_archives: