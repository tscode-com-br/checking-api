name: Apply Nginx Edge Routes (one-time)

on:
  workflow_dispatch:

jobs:
  apply-nginx:
    runs-on: ubuntu-latest
    env:
      OCEAN_PORT: ${{ secrets.OCEAN_PORT != '' && secrets.OCEAN_PORT || '22' }}

    steps:
      - name: Find nginx config path, apply routes, and reload nginx
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 3m
          script: |
            set -euo pipefail

            # Auto-detect the nginx server config file that serves tscode.com.br
            server_config="$(nginx -T 2>/dev/null | awk '
              /^# configuration file/ { f = $NF; gsub(/:$/, "", f) }
              /server_name.*tscode\.com\.br/ { print f; exit }
            ')"

            if [ -z "$server_config" ]; then
              echo "ERROR: Could not auto-detect nginx server config for tscode.com.br"
              echo ""
              echo "Available config files found by nginx -T:"
              nginx -T 2>/dev/null | grep "^# configuration file" | head -20
              exit 1
            fi

            echo "================================================================"
            echo "Detected nginx server config: $server_config"
            echo "Set this as GitHub secret OCEAN_NGINX_SERVER_CONFIG:"
            echo "  $server_config"
            echo "================================================================"

            cd '${{ secrets.OCEAN_APP_DIR }}'

            bash deploy/nginx/manage_checking_edge_cutover.sh apply \
              --server-config "$server_config" \
              --routes-file deploy/nginx/checking-edge-routes.conf \
              --http-config-target /etc/nginx/conf.d/checkcheck-edge-http.conf \
              --http-rules-file deploy/nginx/checking-edge-http.conf \
              --reload

            echo ""
            echo "SUCCESS: nginx reloaded. Route /api/transport/ai/route-calculations now has proxy_read_timeout 1860s."
            echo "Verify with: nginx -T 2>/dev/null | grep -A5 'route-calculations'"
