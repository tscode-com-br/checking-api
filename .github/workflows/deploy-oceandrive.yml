name: Deploy OceanDrive

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_dir:
        description: Optional remote directory for the fallback deploy. Leave blank to reuse OCEAN_APP_DIR.
        required: false
        type: string

concurrency:
  group: deploy-oceandrive-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OCEAN_PORT: ${{ secrets.OCEAN_PORT != '' && secrets.OCEAN_PORT || '22' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve deploy directory
        id: deploy_dir
        env:
          OCEAN_DEFAULT_APP_DIR: ${{ secrets.OCEAN_APP_DIR }}
          OCEAN_DEPLOY_DIR_INPUT: ${{ inputs.deploy_dir }}
        run: |
          set -e
          deploy_dir="$OCEAN_DEFAULT_APP_DIR"
          validate_public="true"
          if [ -n "$OCEAN_DEPLOY_DIR_INPUT" ]; then
            deploy_dir="$OCEAN_DEPLOY_DIR_INPUT"
            if [ "$OCEAN_DEPLOY_DIR_INPUT" != "$OCEAN_DEFAULT_APP_DIR" ]; then
              validate_public="false"
            fi
          fi
          test -n "$deploy_dir"
          echo "path=$deploy_dir" >> "$GITHUB_OUTPUT"
          echo "validate_public=$validate_public" >> "$GITHUB_OUTPUT"
          echo "public_health_url=https://tscode.com.br/api/health" >> "$GITHUB_OUTPUT"

      - name: Validate deploy secrets
        env:
          OCEAN_HOST: ${{ secrets.OCEAN_HOST }}
          OCEAN_USER: ${{ secrets.OCEAN_USER }}
          OCEAN_SSH_KEY: ${{ secrets.OCEAN_SSH_KEY }}
          OCEAN_HOST_FINGERPRINT: ${{ secrets.OCEAN_HOST_FINGERPRINT }}
        run: |
          set -e
          test -n "$OCEAN_HOST"
          test -n "$OCEAN_USER"
          test -n "${{ steps.deploy_dir.outputs.path }}"
          test -n "$OCEAN_SSH_KEY"

      - name: Build and push application image
        env:
          APP_IMAGE: ghcr.io/tscode-com-br/checkcheck-app
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "$APP_IMAGE:main" || true
          docker build --pull --target app-runtime --cache-from "$APP_IMAGE:main" -t "$APP_IMAGE:${{ github.sha }}" -t "$APP_IMAGE:main" .
          docker push "$APP_IMAGE:${{ github.sha }}"
          docker push "$APP_IMAGE:main"
          docker logout ghcr.io || true

      - name: Build and push forms-worker image
        env:
          FORMS_WORKER_IMAGE: ghcr.io/tscode-com-br/checkcheck-forms-worker
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker pull "$FORMS_WORKER_IMAGE:main" || true
          docker build --pull --target forms-worker-runtime --cache-from "$FORMS_WORKER_IMAGE:main" -t "$FORMS_WORKER_IMAGE:${{ github.sha }}" -t "$FORMS_WORKER_IMAGE:main" .
          docker push "$FORMS_WORKER_IMAGE:${{ github.sha }}"
          docker push "$FORMS_WORKER_IMAGE:main"
          docker logout ghcr.io || true

      - name: Resolve SSH verification settings
        id: ssh_verification
        env:
          OCEAN_HOST: ${{ secrets.OCEAN_HOST }}
          OCEAN_HOST_FINGERPRINT: ${{ secrets.OCEAN_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [ -z "$OCEAN_HOST_FINGERPRINT" ] || [ "$OCEAN_HOST_FINGERPRINT" = "__UNSET__" ]; then
            scanned_fingerprints="$(ssh-keyscan -T 10 -p "$OCEAN_PORT" "$OCEAN_HOST" 2>/dev/null | sed '/^#/d' | ssh-keygen -lf - -E sha256 2>/dev/null | awk '{print $2}' || true)"
            echo "::warning::OCEAN_HOST_FINGERPRINT nao configurado; o ssh-action nao fara validacao por fingerprint e o rsync usara host key scan em tempo de execucao."
            if [ -n "$scanned_fingerprints" ]; then
              echo "Fingerprints SSH observados para $OCEAN_HOST:$OCEAN_PORT:"
              printf '%s\n' "$scanned_fingerprints"
            fi
            echo "fingerprint=" >> "$GITHUB_OUTPUT"
            echo "strict_hostkeys_checking=true" >> "$GITHUB_OUTPUT"
            echo "rsh=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          key="$(ssh-keyscan -T 10 -p "$OCEAN_PORT" "$OCEAN_HOST" 2>/dev/null | sed '/^#/d')"
          if [ -z "$key" ]; then
            echo "Nao foi possivel obter a host key SSH de $OCEAN_HOST:$OCEAN_PORT"
            exit 1
          fi

          fingerprints="$(printf '%s\n' "$key" | ssh-keygen -lf - -E sha256 | awk '{print $2}')"
          if ! printf '%s\n' "$fingerprints" | grep -Fxq "$OCEAN_HOST_FINGERPRINT"; then
            echo "Fingerprint SSH inesperado para $OCEAN_HOST:$OCEAN_PORT"
            printf '%s\n' "$fingerprints"
            exit 1
          fi

          known_hosts_path="$GITHUB_WORKSPACE/.github/ocean_known_hosts"
          printf '%s\n' "$key" > "$known_hosts_path"
          chmod 600 "$known_hosts_path"
          echo "fingerprint=$OCEAN_HOST_FINGERPRINT" >> "$GITHUB_OUTPUT"
          echo "strict_hostkeys_checking=false" >> "$GITHUB_OUTPUT"
          echo "rsh=-o UserKnownHostsFile=/github/workspace/.github/ocean_known_hosts -o StrictHostKeyChecking=yes" >> "$GITHUB_OUTPUT"

      - name: Ensure remote app directory exists
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            mkdir -p ${{ steps.deploy_dir.outputs.path }}

      - name: Remove legacy nested app directories
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            cd ${{ steps.deploy_dir.outputs.path }}
            rm -rf checking_android_new checking_kotlin checking_kotlin_new

      - name: Sync project to server
        id: sync_project
        uses: burnett01/rsync-deployments@dc0d5d44c4728aad3f02154a87309809e62a960f # 8.0.4
        with:
          switches: >-
            -avzr --delete
            --exclude ".git/"
            --exclude ".github/"
            --exclude ".venv/"
            --exclude ".pytest_cache/"
            --exclude "*.db"
            --exclude "deploy/keys/"
            --exclude ".env"
          path: ./
          remote_path: ${{ steps.deploy_dir.outputs.path }}
          remote_host: ${{ secrets.OCEAN_HOST }}
          remote_user: ${{ secrets.OCEAN_USER }}
          remote_key: ${{ secrets.OCEAN_SSH_KEY }}
          remote_port: ${{ env.OCEAN_PORT }}
          strict_hostkeys_checking: ${{ steps.ssh_verification.outputs.strict_hostkeys_checking }}
          rsh: ${{ steps.ssh_verification.outputs.rsh }}

      - name: Preflight deploy disk guard
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 10m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            min_free_gib=8
            min_free_bytes=$((min_free_gib * 1024 * 1024 * 1024))

            if [ -x /usr/local/sbin/checkcheck-ssd-cleanup ]; then
              /usr/local/sbin/checkcheck-ssd-cleanup
            else
              docker image prune -af || true
              docker builder prune -af || true
              docker system prune -af --volumes || true
              apt-get clean || true
              rm -rf /var/lib/apt/lists/* /var/cache/apt/archives/* || true
              find /tmp /var/tmp -mindepth 1 -mmin +120 -exec rm -rf {} + 2>/dev/null || true
            fi

            available_bytes="$(df -B1 --output=avail / | tail -n 1 | tr -d ' ')"
            used_percent="$(df --output=pcent / | tail -n 1 | tr -dc '0-9')"

            if [ "$available_bytes" -lt "$min_free_bytes" ]; then
              echo "Free disk after preflight cleanup is below ${min_free_gib}GiB; aborting before image pull."
              df -h /
              docker system df || true
              exit 1
            fi

            echo "Preflight disk guard passed with $((available_bytes / 1024 / 1024 / 1024))GiB free and ${used_percent}% used."

      - name: Snapshot disk usage before restart
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            echo "[snapshot] before restart"
            date -Is
            df -h /
            echo "[docker-system-df]"
            docker system df
            echo "[tmp]"
            du -xh --max-depth=1 /tmp /var/tmp 2>/dev/null | sort -h | tail -n 20

      - name: Materialize production .env from GitHub secret
        env:
          OCEAN_APP_ENV_B64: ${{ secrets.OCEAN_APP_ENV_B64 }}
        if: env.OCEAN_APP_ENV_B64 != ''
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            cd ${{ steps.deploy_dir.outputs.path }}
            temp_env="$(mktemp)"
            cleanup() {
              rm -f "$temp_env"
            }
            trap cleanup EXIT
            printf '%s' '${{ env.OCEAN_APP_ENV_B64 }}' | base64 -d > "$temp_env"
            if [ ! -s "$temp_env" ]; then
              echo "Decoded .env from OCEAN_APP_ENV_B64 is empty"
              exit 1
            fi
            install -m 600 "$temp_env" .env

      - name: Pull application image on host
        id: pull_application_image
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 15m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            cd ${{ steps.deploy_dir.outputs.path }}
            if [ ! -f .env ]; then
              echo "Arquivo .env nao encontrado em ${{ steps.deploy_dir.outputs.path }}"
              exit 1
            fi
            APP_IMAGE='ghcr.io/tscode-com-br/checkcheck-app:${{ github.sha }}'
            FORMS_WORKER_IMAGE='ghcr.io/tscode-com-br/checkcheck-forms-worker:${{ github.sha }}'
            TEMP_DOCKER_CONFIG="$(mktemp -d)"
            cleanup() {
              rm -rf "$TEMP_DOCKER_CONFIG"
            }
            trap cleanup EXIT
            export DOCKER_CONFIG="$TEMP_DOCKER_CONFIG"
            docker compose up -d db
            printf '%s' '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            CHECKCHECK_APP_IMAGE="$APP_IMAGE" docker compose pull app
            CHECKCHECK_FORMS_WORKER_IMAGE="$FORMS_WORKER_IMAGE" docker compose pull forms-worker
            docker logout ghcr.io || true

      - name: Run database migration
        id: run_database_migration
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 15m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}
            export CHECKCHECK_APP_IMAGE='ghcr.io/tscode-com-br/checkcheck-app:${{ github.sha }}'
            export CHECKCHECK_FORMS_WORKER_IMAGE='ghcr.io/tscode-com-br/checkcheck-forms-worker:${{ github.sha }}'
            bash deploy/maintenance/run_app_rollout.sh \
              --phase migrate \
              --deploy-dir '${{ steps.deploy_dir.outputs.path }}'

      - name: Start application runtime
        id: start_application_runtime
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 10m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}
            export CHECKCHECK_APP_IMAGE='ghcr.io/tscode-com-br/checkcheck-app:${{ github.sha }}'
            export CHECKCHECK_FORMS_WORKER_IMAGE='ghcr.io/tscode-com-br/checkcheck-forms-worker:${{ github.sha }}'
            bash deploy/maintenance/run_app_rollout.sh \
              --phase start \
              --deploy-dir '${{ steps.deploy_dir.outputs.path }}'

      - name: Apply nginx edge routes
        env:
          OCEAN_NGINX_SERVER_CONFIG: ${{ secrets.OCEAN_NGINX_SERVER_CONFIG }}
        if: env.OCEAN_NGINX_SERVER_CONFIG != ''
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}
            bash deploy/nginx/manage_checking_edge_cutover.sh apply \
              --server-config '${{ env.OCEAN_NGINX_SERVER_CONFIG }}' \
              --routes-file deploy/nginx/checking-edge-routes.conf \
              --http-config-target /etc/nginx/conf.d/checkcheck-edge-http.conf \
              --http-rules-file deploy/nginx/checking-edge-http.conf \
              --reload

      - name: Snapshot disk usage after restart
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            echo "[snapshot] after restart"
            date -Is
            df -h /
            echo "[docker-system-df]"
            docker system df
            echo "[tmp]"
            du -xh --max-depth=1 /tmp /var/tmp 2>/dev/null | sort -h | tail -n 20

      - name: Validate local application health
        id: validate_local_application_health
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 3m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}
            bash deploy/maintenance/run_app_rollout.sh \
              --phase validate-local \
              --deploy-dir '${{ steps.deploy_dir.outputs.path }}'

      - name: Validate public application health
        if: ${{ steps.deploy_dir.outputs.validate_public == 'true' }}
        run: |
          set -euo pipefail
          bash deploy/smoke/validate_url.sh \
            --label public-api \
            --url '${{ steps.deploy_dir.outputs.public_health_url }}' \
            --contains '"status":"ok"'

      - name: Mark deployed release
        id: mark_deployed_release
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}
            bash deploy/maintenance/run_app_rollout.sh \
              --phase mark-release \
              --deploy-dir '${{ steps.deploy_dir.outputs.path }}' \
              --release-id '${{ github.sha }}'

      - name: Install SSD cleanup automation
        if: ${{ always() && steps.ssh_verification.conclusion == 'success' && steps.sync_project.conclusion == 'success' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 3m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            cd ${{ steps.deploy_dir.outputs.path }}
            install -d /usr/local/sbin
            install -m 755 deploy/maintenance/checkcheck_ssd_cleanup.sh /usr/local/sbin/checkcheck-ssd-cleanup
            install -d /etc/systemd/system
            install -m 644 deploy/systemd/checkcheck-ssd-cleanup.service /etc/systemd/system/checkcheck-ssd-cleanup.service
            install -m 644 deploy/systemd/checkcheck-ssd-cleanup.timer /etc/systemd/system/checkcheck-ssd-cleanup.timer
            systemctl daemon-reload
            systemctl enable --now checkcheck-ssd-cleanup.timer

      - name: Run SSD cleanup now
        if: ${{ always() && steps.ssh_verification.conclusion == 'success' && steps.sync_project.conclusion == 'success' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 5m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            /usr/local/sbin/checkcheck-ssd-cleanup

      - name: Snapshot disk usage after cleanup
        if: ${{ always() && steps.ssh_verification.conclusion == 'success' && steps.sync_project.conclusion == 'success' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 2m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -e
            echo "[snapshot] after cleanup"
            date -Is
            df -h /
            echo "[docker-system-df]"
            docker system df
            echo "[tmp]"
            du -xh --max-depth=1 /tmp /var/tmp 2>/dev/null | sort -h | tail -n 20

      - name: Verify deploy residue guard
        if: ${{ always() && steps.ssh_verification.conclusion == 'success' && steps.sync_project.conclusion == 'success' }}
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.OCEAN_HOST }}
          username: ${{ secrets.OCEAN_USER }}
          key: ${{ secrets.OCEAN_SSH_KEY }}
          port: ${{ env.OCEAN_PORT }}
          timeout: 60s
          command_timeout: 3m
          fingerprint: ${{ steps.ssh_verification.outputs.fingerprint }}
          script: |
            set -euo pipefail
            cd ${{ steps.deploy_dir.outputs.path }}

            dangling_images="$(docker image ls --filter dangling=true -q | sed '/^$/d' | wc -l | tr -d ' ')"
            exited_containers="$(docker ps -aq -f status=exited | sed '/^$/d' | wc -l | tr -d ' ')"
            stale_temp_dirs="$(find /tmp /var/tmp -maxdepth 1 \( -name 'checkcheck-deploy-*' -o -name 'checkcheck-stage-*' -o -name 'checkcheck-rsync-*' \) -print 2>/dev/null | sed '/^$/d' | wc -l | tr -d ' ')"
            app_container_id="$(docker compose ps -q app | head -n 1)"

            if [ -z "$app_container_id" ]; then
              echo "App container not found while validating deploy residue guard."
              docker compose ps || true
              exit 1
            fi

            running_app_image_id="$(docker inspect -f '{{.Image}}' "$app_container_id")"
            app_image_ids="$(docker image ls ghcr.io/tscode-com-br/checkcheck-app --no-trunc --format '{{.ID}}' | sed '/^$/d' | sort -u)"
            app_image_count="$(printf '%s\n' "$app_image_ids" | sed '/^$/d' | wc -l | tr -d ' ')"

            if [ "$dangling_images" -ne 0 ]; then
              echo "Found dangling Docker images after deploy cleanup."
              docker image ls --filter dangling=true || true
              exit 1
            fi

            if [ "$exited_containers" -ne 0 ]; then
              echo "Found exited containers after deploy cleanup."
              docker ps -a -f status=exited || true
              exit 1
            fi

            if [ "$stale_temp_dirs" -ne 0 ]; then
              echo "Found stale deploy temp directories after cleanup."
              find /tmp /var/tmp -maxdepth 1 \( -name 'checkcheck-deploy-*' -o -name 'checkcheck-stage-*' -o -name 'checkcheck-rsync-*' \) -print 2>/dev/null || true
              exit 1
            fi

            if [ "$app_image_count" -ne 1 ] || ! printf '%s\n' "$app_image_ids" | grep -Fxq "$running_app_image_id"; then
              echo "Found unexpected Checkcheck app images after cleanup."
              echo "Running app image: $running_app_image_id"
              docker image ls ghcr.io/tscode-com-br/checkcheck-app --no-trunc || true
              exit 1
            fi

            echo "Deploy residue guard passed with only the active app image remaining on disk."
